name: ClaudeUsageBar
options:
  bundleIdPrefix: com.miguelsosa
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_IDENTITY: "Apple Development"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: LHTM3GR6U5
    ENABLE_HARDENED_RUNTIME: NO
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

targets:
  ClaudeUsageBar:
    type: application
    platform: macOS
    sources:
      - src/ClaudeUsageBar.swift
      - src/main.swift
    resources:
      - path: Resources/claudecode-color.svg
      - path: Resources/ClaudeUsageBar.icns
        optional: true
    info:
      path: Resources/Info.plist
      properties:
        CFBundleShortVersionString: "1.1"
        CFBundleVersion: "1.1"
        CFBundleIconFile: ClaudeUsageBar
        LSUIElement: true
        NSHighResolutionCapable: true
        LSMinimumSystemVersion: "13.0"
        NSUserNotificationAlertStyle: alert
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.miguelsosa.claude-usage-bar
        PRODUCT_NAME: ClaudeUsageBar
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
    dependencies:
      - target: ClaudeUsageBarWidget
        embed: true
        codeSign: false
    frameworks:
      - sdk: Cocoa.framework
      - sdk: UserNotifications.framework
      - sdk: WidgetKit.framework

  ClaudeUsageBarWidget:
    type: app-extension
    platform: macOS
    sources:
      - widget/ClaudeUsageBarWidget.swift
    info:
      path: widget/Info.plist
      properties:
        CFBundleShortVersionString: "1.1"
        CFBundleVersion: "1.1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.miguelsosa.claude-usage-bar.widget
        PRODUCT_NAME: ClaudeUsageBarWidget
        SKIP_INSTALL: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../../../../Frameworks"
        CODE_SIGN_ENTITLEMENTS: widget/ClaudeUsageBarWidget.entitlements
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: LHTM3GR6U5
    frameworks:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
